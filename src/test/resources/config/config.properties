# =============================================================
# Appium Server Configuration
# =============================================================
appium.server.url=http://127.0.0.1:4723

# =============================================================
# Physical Android Device Configuration
# Run: adb devices  →  copy the UDID shown in the first column
# =============================================================
device.name=Galaxy s21
platform.version=12
device.udid=adb-R5CRA1JVYWL-3TRgFc._adb-tls-connect._tcp

# =============================================================
# App Configuration
# Option A – provide APK path (Appium installs it each run)
# Option B – launch an app already installed on the device
#            comment out app.path and uncomment app.package/activity
# =============================================================
app.path=src/test/resources/apps/fleet_management.apk

# app.package=com.example.fleet_management
# app.activity=com.example.fleet_management.MainActivity

# =============================================================
# Appium Behaviour Flags
# =============================================================
# Grant all runtime permissions automatically (no permission pop-ups)
auto.grant.permissions=true

# false → reset app state between sessions (default for clean runs)
no.reset=false

# true → uninstall + reinstall the app before every session
full.reset=false

# Seconds before Appium kills an idle session
new.command.timeout=60
